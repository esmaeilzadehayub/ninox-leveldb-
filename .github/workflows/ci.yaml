name: CI — Build · Scan · Push

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY: ninox-leveldb

permissions:
  id-token: write      # OIDC — no long-lived AWS keys
  contents: read
  security-events: write

jobs:
  # ── 1. Lint ──────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Helm lint
        run: |
          curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm lint helm/ninox-leveldb

      - name: Terraform fmt
        uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.7.0" }
      - run: terraform fmt -check -recursive terraform/

      - name: YAML lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: helm/ k8s/
          config_data: |
            extends: default
            rules:
              line-length: { max: 160 }
              truthy: disable

  # ── 2. Test ──────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22" }
      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out
      - uses: codecov/codecov-action@v4
        with: { files: coverage.out }

  # ── 3. Docker build + Trivy scan ─────────────────────────────────
  build-and-scan:
    name: Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (local, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Load for scanning
        run: docker load -i /tmp/image.tar

      - name: Trivy — fail on CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: sarif
          output: trivy.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"          # Block merge on CRITICAL CVEs

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with: { sarif_file: trivy.sarif }

      - uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ── 4. Push to ECR ───────────────────────────────────────────────
  push:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ninox-production-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with: { name: docker-image, path: /tmp }

      - name: Tag and push
        run: |
          docker load -i /tmp/image.tar
          for TAG in $(echo "${{ steps.meta.outputs.tags }}"); do
            docker tag ${{ env.ECR_REPOSITORY }}:${{ github.sha }} $TAG
            docker push $TAG
          done

  # ── 5. Terraform plan (on PR) ────────────────────────────────────
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/ninox-production-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with: { terraform_version: "1.7.0" }

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Plan
        working-directory: terraform
        run: |
          terraform plan \
            -var="grafana_admin_password=${{ secrets.GRAFANA_PASSWORD }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan.txt
          echo "### Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat plan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
