{{- if .Values.vpa.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "ninox-leveldb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ninox-leveldb.labels" . | nindent 4 }}
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: StatefulSet
    name: {{ include "ninox-leveldb.fullname" . }}
  updatePolicy:
    updateMode: {{ .Values.vpa.updateMode | quote }}
  resourcePolicy:
    containerPolicies:
      - containerName: application
        minAllowed:
          cpu: "1"
          memory: "4Gi"
        maxAllowed:
          cpu: "16"
          memory: "64Gi"
        controlledResources: ["cpu", "memory"]
{{- end }}
