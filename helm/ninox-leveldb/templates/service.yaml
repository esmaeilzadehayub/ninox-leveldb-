---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ninox-leveldb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ninox-leveldb.labels" . | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "ninox-leveldb.selectorLabels" . | nindent 4 }}
  ports:
    - { name: http,    port: {{ .Values.app.port }},        targetPort: http }
    - { name: metrics, port: {{ .Values.app.metricsPort }}, targetPort: metrics }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ninox-leveldb.fullname" . }}-lb
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ninox-leveldb.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "ninox-leveldb.selectorLabels" . | nindent 4 }}
  ports:
    - { name: http, port: {{ .Values.service.port }}, targetPort: http }
---
{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "ninox-leveldb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ninox-leveldb.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "ninox-leveldb.selectorLabels" . | nindent 6 }}
{{- end }}
---
{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "ninox-leveldb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ninox-leveldb.labels" . | nindent 4 }}
    {{- with .Values.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "ninox-leveldb.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: {{ .Values.serviceMonitor.interval }}
      path: /metrics
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
{{- end }}
---
{{- if .Values.vpa.enabled }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "ninox-leveldb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ninox-leveldb.labels" . | nindent 4 }}
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: StatefulSet
    name: {{ include "ninox-leveldb.fullname" . }}
  updatePolicy:
    updateMode: {{ .Values.vpa.updateMode | quote }}
  resourcePolicy:
    containerPolicies:
      - containerName: application
        minAllowed:
          cpu:    {{ .Values.vpa.minAllowed.cpu | quote }}
          memory: {{ .Values.vpa.minAllowed.memory | quote }}
        maxAllowed:
          cpu:    {{ .Values.vpa.maxAllowed.cpu | quote }}
          memory: {{ .Values.vpa.maxAllowed.memory | quote }}
        controlledResources: ["cpu", "memory"]
{{- end }}
