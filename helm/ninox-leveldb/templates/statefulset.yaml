apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ninox-leveldb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ninox-leveldb.labels" . | nindent 4 }}
  annotations:
    migration/method: {{ .Values.migration.method | quote }}
spec:
  serviceName: {{ include "ninox-leveldb.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ninox-leveldb.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0

  template:
    metadata:
      labels:
        {{- include "ninox-leveldb.labels" . | nindent 8 }}
      annotations:
        # Velero node-agent: file-level backup of the TopoLVM (LVM) volume to S3
        backup.velero.io/backup-volumes: data-volume
        # Prometheus scraping
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.app.metricsPort | quote }}
        prometheus.io/path: "/metrics"

    spec:
      serviceAccountName: {{ include "ninox-leveldb.fullname" . }}

      # Schedule only on NVMe nodes
      nodeSelector:
        ninox/storage: nvme

      tolerations:
        - key: "workload-type"
          operator: "Equal"
          value: "leveldb"
          effect: "NoSchedule"

      # Spread across AZs and nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "ninox-leveldb.selectorLabels" . | nindent 14 }}
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "ninox-leveldb.selectorLabels" . | nindent 14 }}

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      # ──────────────────────────────────────────────────────────
      # INIT CONTAINERS
      # ──────────────────────────────────────────────────────────
      initContainers:

        # ── Always: clear stale LevelDB LOCK file ─────────────
        # LevelDB leaves /LOCK on crash. Without removal the DB
        # fails to open and the pod crash-loops.
        - name: init-leveldb-lock
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              DATA="{{ .Values.app.dataDir }}"
              mkdir -p "$DATA"
              if [ -f "$DATA/LOCK" ]; then
                echo "Stale LOCK found — removing"
                rm -f "$DATA/LOCK"
              fi
              echo "Lock check complete"
          volumeMounts:
            - name: data-volume
              mountPath: {{ .Values.app.dataDir }}
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false

        # ── METHOD 1: Hydration initContainer (RECOMMENDED) ───
        # If NVMe PVC is empty and EFS has data, copy it once.
        # After copy, app runs entirely on fast NVMe — EFS unmounts.
        # The [ -z "$(ls -A /data)" ] check prevents overwriting on restart.
        {{- if eq .Values.migration.method "hydration" }}
        - name: data-sync-from-efs
          image: {{ .Values.migration.copyImage }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              DATA="{{ .Values.app.dataDir }}"
              EFS="/mnt/efs"

              # Only hydrate if NVMe volume is empty (first run)
              if [ -z "$(ls -A $DATA 2>/dev/null)" ]; then
                echo "NVMe PVC is empty — hydrating from EFS..."

                # Check EFS has data before starting copy
                if [ -z "$(ls -A $EFS 2>/dev/null)" ]; then
                  echo "WARNING: EFS is also empty. DataSync may not have run yet."
                  echo "Proceeding with empty volume (first-ever deployment)."
                  exit 0
                fi

                # Install rsync if not present (alpine image)
                which rsync 2>/dev/null || apk add --no-cache rsync

                echo "Starting rsync EFS → NVMe..."
                echo "EFS size: $(du -sh $EFS | cut -f1)"

                rsync \
                  --archive \
                  --checksum \
                  --verbose \
                  --human-readable \
                  --progress \
                  --exclude "LOCK" \
                  --exclude "*.tmp" \
                  "$EFS/" \
                  "$DATA/"

                echo "Hydration complete. NVMe size: $(du -sh $DATA | cut -f1)"
                echo "App will now run on NVMe. EFS mount is no longer needed."
              else
                echo "NVMe PVC already has data ($(du -sh $DATA | cut -f1)) — skipping hydration."
                echo "This is normal on pod restart."
              fi
          volumeMounts:
            - name: data-volume     # Same TopoLVM LV as the app (single PVC)
              mountPath: {{ .Values.app.dataDir }}
            - name: efs-migration   # EFS staging volume — source (read-only)
              mountPath: /mnt/efs
              readOnly: true
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits:   { cpu: "2",    memory: "2Gi" }
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
        {{- end }}

      # ──────────────────────────────────────────────────────────
      # MAIN APPLICATION CONTAINER
      # ──────────────────────────────────────────────────────────
      containers:
        - name: application
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.app.metricsPort }}
              protocol: TCP

          env:
            - name: LEVELDB_DATA_DIR
              value: {{ .Values.app.dataDir | quote }}
            - name: MIGRATION_METHOD
              value: {{ .Values.migration.method | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef: { fieldPath: metadata.name }
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef: { fieldPath: metadata.namespace }
            - name: NODE_NAME
              valueFrom:
                fieldRef: { fieldPath: spec.nodeName }

          volumeMounts:
            # Method 1 (hydration): app uses NVMe only — EFS data was already copied
            # Method 2 (double-mount): app uses NVMe; EFS is side-car for verification
            # Method 3 (velero): Velero already restored data to NVMe; no EFS at all
            - name: data-volume
              mountPath: {{ .Values.app.dataDir }}

            {{- if eq .Values.migration.method "double-mount" }}
            # Method 2: mount EFS alongside NVMe for verification / comparison
            - name: efs-migration
              mountPath: /mnt/migration-archive
              readOnly: true
            {{- end }}

            - name: tmp
              mountPath: /tmp

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}

          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}

          startupProbe:
            httpGet: { path: /healthz, port: {{ .Values.app.port }} }
            failureThreshold: 60
            periodSeconds: 10

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]

          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]

      terminationGracePeriodSeconds: 60

      # ──────────────────────────────────────────────────────────
      # VOLUMES
      # ──────────────────────────────────────────────────────────
      volumes:
        - name: tmp
          emptyDir: {}

        # EFS migration volume (Methods 1 + 2 only)
        {{- if or (eq .Values.migration.method "hydration") (eq .Values.migration.method "double-mount") }}
        {{- if .Values.migration.efsFileSystemId }}
        - name: efs-migration
          csi:
            driver: efs.csi.aws.com
            readOnly: true
            volumeAttributes:
              fileSystemId: {{ .Values.migration.efsFileSystemId | quote }}
              # Each pod mounts its own subdirectory:
              # pod-0 → /pod-0, pod-1 → /pod-1, pod-2 → /pod-2
              # The POD_INDEX is resolved by TopoLVM scheduler to the correct node.
              # For static subdirectory per pod, use the PVC approach in efs-pvc.yaml.
              directoryPath: "{{ .Values.migration.efsSubdirectory }}"
        {{- end }}
        {{- end }}

  # ──────────────────────────────────────────────────────────────
  # PVC TEMPLATE — single NVMe LV per pod (TopoLVM → LVM on i4i NVMe)
  #
  # One PVC only: init containers, app, and Velero FS backup all use `data-volume`.
  # (Previously two templates duplicated storage and split hydration vs app data.)
  #
  #   storageClass = topolvm-provisioner
  #   → TopoLVM carves an LV from node-vg (NVMe disk)
  #   → WaitForFirstConsumer = pod + PV on same node
  #   → reclaimPolicy = Retain (do not auto-delete LevelDB data)
  # ──────────────────────────────────────────────────────────────
  volumeClaimTemplates:
    - metadata:
        name: data-volume
        labels:
          {{- include "ninox-leveldb.labels" . | nindent 10 }}
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "topolvm-provisioner"
        resources:
          requests:
            storage: {{ .Values.persistence.size }}

---
# ── ServiceAccount ────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "ninox-leveldb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ninox-leveldb.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.serviceAccount.annotations | nindent 4 }}
automountServiceAccountToken: false
