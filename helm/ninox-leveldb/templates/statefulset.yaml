apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "ninox-leveldb.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ninox-leveldb.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "ninox-leveldb.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ninox-leveldb.selectorLabels" . | nindent 6 }}
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  template:
    metadata:
      labels:
        {{- include "ninox-leveldb.labels" . | nindent 8 }}
      annotations:
        # ── Velero: back up the data-volume PVC via Kopia ──────────
        backup.velero.io/backup-volumes: data-volume

        # ── Prometheus: scrape metrics from this pod ────────────────
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"

    spec:
      # ── Only schedule on NVMe nodes ──────────────────────────────
      nodeSelector:
        ninox/storage: nvme

      # ── Tolerate the NVMe node taint ─────────────────────────────
      tolerations:
        - key: "workload-type"
          operator: "Equal"
          value: "leveldb"
          effect: "NoSchedule"

      # ── Spread pods across AZs and nodes ─────────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "ninox-leveldb.selectorLabels" . | nindent 14 }}
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              {{- include "ninox-leveldb.selectorLabels" . | nindent 14 }}

      # ── Init container: clear stale LevelDB LOCK file ─────────────
      initContainers:
        - name: init-leveldb
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -e
              DATA_DIR="/var/lib/leveldb"
              mkdir -p "${DATA_DIR}"
              # LevelDB leaves a LOCK file on crash — remove it so DB opens
              if [ -f "${DATA_DIR}/LOCK" ]; then
                echo "Stale LOCK found, removing..."
                rm -f "${DATA_DIR}/LOCK"
              fi
              echo "Init complete"
          volumeMounts:
            - name: data-volume
              mountPath: /var/lib/leveldb
          securityContext:
            runAsUser: 0

      # ── Main application container ────────────────────────────────
      containers:
        - name: application
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          env:
            - name: LEVELDB_DATA_DIR
              value: /var/lib/leveldb
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          volumeMounts:
            - name: data-volume
              mountPath: /var/lib/leveldb
            - name: tmp
              mountPath: /tmp

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}

          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}

          # Startup probe: give large datasets 10 minutes to load
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 60
            periodSeconds: 10

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: [ALL]

          # Graceful shutdown: give LevelDB time to flush WAL
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]

      terminationGracePeriodSeconds: 60

      # Pod-level security
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      volumes:
        - name: tmp
          emptyDir: {}

  # ── PVC template — provisioned by TopoLVM from NVMe node-vg ──────
  volumeClaimTemplates:
    - metadata:
        name: data-volume
        labels:
          {{- include "ninox-leveldb.labels" . | nindent 10 }}
        annotations:
          # Velero includes this PVC in file-system backup
          backup.velero.io/backup-volumes: data-volume
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "topolvm-provisioner"   # NVMe LVM volume
        resources:
          requests:
            storage: {{ .Values.persistence.size }}   # 800Gi (2Ti if using EBS)
