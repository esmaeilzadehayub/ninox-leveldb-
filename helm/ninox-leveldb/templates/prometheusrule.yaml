apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: leveldb-alerts
  namespace: monitoring
  labels:
    release: prometheus-stack
    {{- include "ninox-leveldb.labels" . | nindent 4 }}
spec:
  groups:
    - name: LevelDBStorage
      rules:
        - alert: PersistentVolumeHighUsage
          expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.85
          for: 5m
          labels: { severity: warning }
          annotations:
            summary: "Pod {{`{{ $labels.pod }}`}} NVMe storage > 85%"
            description: "Expand PVC before LevelDB stops writing."

        - alert: PersistentVolumeCriticalUsage
          expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.95
          for: 2m
          labels: { severity: critical }
          annotations:
            summary: "CRITICAL: Pod {{`{{ $labels.pod }}`}} volume almost full"
            description: "LevelDB will stop writing. Expand immediately."

        - alert: LevelDBPodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{namespace="{{ .Release.Namespace }}",pod=~"{{ include "ninox-leveldb.fullname" . }}-.*"}[5m]) * 60 > 1
          for: 2m
          labels: { severity: critical }
          annotations:
            summary: "Pod {{`{{ $labels.pod }}`}} crash-looping"
            description: "Check init-leveldb-lock container logs."

        - alert: LevelDBHydrationFailed
          expr: kube_pod_init_container_status_last_terminated_reason{namespace="{{ .Release.Namespace }}",reason="Error",container="data-sync-from-efs"} == 1
          for: 2m
          labels: { severity: warning }
          annotations:
            summary: "EFS hydration initContainer failed on {{`{{ $labels.pod }}`}}"
            description: "Method 1 copy failed. Check: kubectl logs {{`{{ $labels.pod }}`}} -c data-sync-from-efs"

        # Velero exposes these on /metrics (ServiceMonitor enabled). RPO target 6h → alert if >7h since last success.
        - alert: VeleroBackupNotRecent
          expr: (time() - max(velero_backup_last_successful_timestamp)) > 25200
          for: 10m
          labels: { severity: warning }
          annotations:
            summary: "Velero RPO at risk — no successful backup in 7+ hours"
            description: "Verify schedule leveldb-6h-backup and node-agent on NVMe nodes. kubectl get backup -n velero"

        - alert: VeleroBackupFailed
          expr: increase(velero_backup_failure_total[30m]) > 0
          for: 5m
          labels: { severity: warning }
          annotations:
            summary: "Velero reported backup failures"
            description: "kubectl logs -n velero deploy/velero -c velero | tail -80"
