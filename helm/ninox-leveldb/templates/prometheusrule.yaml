apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: leveldb-alerts
  namespace: monitoring
  labels:
    release: prometheus-stack   # Must match Prometheus ruleSelector label
    {{- include "ninox-leveldb.labels" . | nindent 4 }}
spec:
  groups:
    - name: LevelDBStorage
      rules:

        # ── PVC usage > 85% ──────────────────────────────────────────
        - alert: PersistentVolumeHighUsage
          expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "StatefulSet Pod {{ $labels.pod }} storage usage > 85%"
            description: >
              Pod {{ $labels.pod }} NVMe volume is {{ $value | humanizePercentage }} full.
              Expand with: kubectl patch pvc data-volume-{{ $labels.pod }} -p '{"spec":{"resources":{"requests":{"storage":"900Gi"}}}}'
            runbook_url: "https://github.com/ninox-org/ninox-k8s/blob/main/docs/velero-backup.md"

        # ── PVC usage > 95% — critical ───────────────────────────────
        - alert: PersistentVolumeCriticalUsage
          expr: kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes > 0.95
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "CRITICAL: Pod {{ $labels.pod }} NVMe volume almost full"
            description: "LevelDB writes will fail. Immediate action required."

        # ── Pod crash loop ────────────────────────────────────────────
        - alert: LevelDBPodCrashLooping
          expr: >
            rate(kube_pod_container_status_restarts_total{
              namespace="{{ .Release.Namespace }}",
              pod=~"{{ include "ninox-leveldb.fullname" . }}-.*"
            }[5m]) * 60 > 1
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Pod {{ $labels.pod }} is crash-looping"
            description: "Restart rate {{ $value | humanize }}/min. Check: kubectl logs {{ $labels.pod }} -n {{ .Release.Namespace }}"

        # ── StatefulSet not fully ready ───────────────────────────────
        - alert: LevelDBStatefulSetDegraded
          expr: >
            kube_statefulset_status_replicas_ready{
              namespace="{{ .Release.Namespace }}",
              statefulset="{{ include "ninox-leveldb.fullname" . }}"
            } < kube_statefulset_status_replicas{
              namespace="{{ .Release.Namespace }}",
              statefulset="{{ include "ninox-leveldb.fullname" . }}"
            }
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "LevelDB StatefulSet has fewer ready replicas than desired"
            description: "{{ $value }} pods ready. Check pod events."

        # ── Velero backup not recent ──────────────────────────────────
        - alert: VeleroBackupNotRecent
          expr: >
            (time() - velero_backup_last_successful_timestamp{schedule="leveldb-6h-backup"}) > 25200
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Velero backup not run in 7+ hours (RPO exceeded)"
            description: "Last successful backup was {{ $value | humanizeDuration }} ago."

        # ── Velero backup failure ─────────────────────────────────────
        - alert: VeleroBackupFailed
          expr: velero_backup_failure_total{schedule="leveldb-6h-backup"} > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Velero backup schedule {{ $labels.schedule }} has failures"
            description: "Run: kubectl logs -n velero deploy/velero | tail -100"

        # ── Node NVMe not available ────────────────────────────────────
        - alert: NVMeNodeNoCapacity
          expr: >
            count(kube_node_labels{label_ninox_storage="nvme"}) 
            unless on(node)
            count(kube_node_status_capacity{resource="topolvm_io_capacity"})
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "NVMe node has no TopoLVM capacity reported"
            description: "LVM setup may have failed. Check /var/log/nvme-lvm-setup.log on the node."
